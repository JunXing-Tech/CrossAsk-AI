spring:
  application:
    name: crossask-ingestion
  # 启动时通过 --spring.profiles.active=docs 或 products 指定 Runner；
  # 默认不指定时两个 Runner 都不会执行，避免误跑
  ai:
    dashscope:
      api-key: ${DASHSCOPE_API_KEY}
      embedding:
        model: text-embedding-v4
        options:
          dimensions: 1024
    # v0.6 起 ingestion 不再使用 Spring AI 的 QdrantVectorStore，直接用 Qdrant REST API
    # （collection 改为 named vectors，Spring AI starter 期望单向量 collection 会启动报错）
  datasource:
    # v0.7 引入：远程 MySQL 5.7.44；库名为 crossask_ai（与账号同名），由 db-init/V0_7__products.sql 手动建好
    url: jdbc:mysql://101.96.211.131:3306/crossask_ai?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:crossask_ai}
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

crossask:
  qdrant:
    host: 101.96.211.131
    port: 6333
    collection: crossask_docs
    dimension: 1024
    distance: Cosine
  hybrid:
    enabled: true
  product:
    crawl:
      keywords:
        - "iphone 15"
        - "airpods pro"
        - "sony headphones"
        - "macbook air"
        - "kindle paperwhite"
      max-per-keyword: 5
      search-url: "https://www.ebay.com/sch/i.html?_nkw={kw}"
      request-interval-ms: 2000
